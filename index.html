<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="サブスクBOX - スマートで洗練されたサブスク管理アプリ。AI、音楽、画像、Amazonなどの利用料を可視化。">
  <title>サブスクBOX | スマートサブスクリプション管理</title>
  
  <!-- CSS Stylesheets -->
 <link rel="stylesheet" href="css/style.css">


  <!-- GitHub Pages fallback CSS: css/style.css が読めない時でも崩れない保険 -->
  <style id="github-pages-fallback-style">
    :root {
      --bg-primary: #080b16;
      --bg-secondary: #111827;
      --panel-bg: rgba(17, 24, 39, 0.78);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --color-ai: #8b5cf6;
      --color-music: #22c55e;
      --color-video: #38bdf8;
      --color-amazon: #f59e0b;
      --color-other: #ec4899;
      --color-active: #34d399;
      --color-danger: #fb7185;
      --color-edit: #60a5fa;
      --radius-lg: 20px;
      --radius-md: 14px;
      --shadow-glow: 0 20px 60px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Meiryo, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 18% 10%, rgba(139, 92, 246, 0.28), transparent 34%),
        radial-gradient(circle at 85% 20%, rgba(56, 189, 248, 0.22), transparent 30%),
        linear-gradient(135deg, #070816 0%, #101827 48%, #0b1020 100%);
      overflow-x: hidden;
    }

    .bg-glow-purple,
    .bg-glow-blue {
      position: fixed;
      width: 42vw;
      height: 42vw;
      border-radius: 999px;
      filter: blur(80px);
      opacity: 0.38;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-purple {
      left: -12vw;
      top: -12vw;
      background: #7c3aed;
    }

    .bg-glow-blue {
      right: -14vw;
      top: 18vh;
      background: #0284c7;
    }

    .app-container {
      position: relative;
      z-index: 1;
      width: min(1440px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .glass-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-glow);
      backdrop-filter: blur(18px);
    }

    header.glass-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .logo-area,
    .header-actions,
    .list-title,
    .chart-header,
    .form-title,
    .kpi-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 3vw, 2.3rem);
      letter-spacing: 0.03em;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 20px;
      align-items: start;
    }

    .sidebar-panel,
    .main-panel {
      min-width: 0;
    }

    .kpi-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .kpi-card,
    .chart-panel,
    .form-panel,
    .main-panel {
      padding: 18px;
    }

    .kpi-label {
      justify-content: space-between;
      color: var(--text-secondary);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .kpi-value {
      margin-top: 8px;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .kpi-value span {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-left: 4px;
    }

    #total-monthly-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px !important;
      padding: 4px 10px;
      border-radius: 999px;
      color: #e0f2fe !important;
      background: rgba(14, 165, 233, 0.18);
      border: 1px solid rgba(125, 211, 252, 0.28);
    }

    .chart-panel { margin-bottom: 16px; }

    .chart-container {
      position: relative;
      width: min(260px, 76vw);
      aspect-ratio: 1 / 1;
      margin: 20px auto;
    }

    .donut-svg {
      width: 100%;
      height: 100%;
      display: block;
      transform: rotate(-90deg);
    }

    .donut-svg circle,
    .donut-hole,
    .donut-ring {
      fill: none !important;
      stroke-linecap: round;
    }

    .donut-hole {
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 18;
    }

    .donut-ring {
      stroke: rgba(139, 92, 246, 0.95);
      stroke-width: 18;
      stroke-dasharray: 0 999;
    }

    .chart-center-text {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      text-align: center;
      transform: none;
    }

    .chart-center-value {
      font-size: 1.25rem;
      font-weight: 800;
    }

    .chart-center-label,
    .chart-legend,
    label,
    p {
      color: var(--text-secondary);
    }

    .mode-toggle,
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0;
    }

    .btn,
    .mode-btn,
    button,
    label.btn {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.62rem 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .btn-primary,
    .mode-btn.active {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      border-color: transparent;
    }

    .btn-secondary { background: rgba(255, 255, 255, 0.09); }
    .btn-danger { background: rgba(244, 63, 94, 0.9); }
    .btn-sm { padding: 0.45rem 0.7rem; font-size: 0.82rem; }
    .btn-full { width: 100%; justify-content: center; }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #ffffff;
      background: rgba(2, 6, 23, 0.62);
      padding: 0.72rem 0.85rem;
      outline: none;
    }

    select option { color: #111827; }

    .form-group { margin-bottom: 0.95rem; }
    .input-row { display: grid; align-items: center; }

    .presets-grid,
    .subsc-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .search-bar-container { margin: 14px 0; }
    .search-input-wrapper { position: relative; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted); }
    #search-input { padding-left: 40px; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(2, 6, 23, 0.72);
    }

    .modal-content {
      width: min(720px, 100%);
      max-height: 90vh;
      overflow: auto;
      padding: 20px;
    }

    .modal-header,
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      padding: 0;
      border-radius: 50%;
      font-size: 1.4rem;
    }

    @media (max-width: 900px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      header.glass-panel { align-items: flex-start; flex-direction: column; }
      .header-actions { width: 100%; flex-wrap: wrap; }
    }
  </style>

</head>
<body>

  <!-- Extra neon background glows -->
  <div class="bg-glow-purple"></div>
  <div class="bg-glow-blue"></div>

  <div class="app-container">
    
    <!-- Header -->
    <header class="glass-panel">
      <div class="logo-area">
        <div class="logo-icon">
          <i data-lucide="box"></i>
        </div>
        <div>
          <h1>サブスクBOX</h1>
          <p style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 500; margin-top: -0.25rem;">
            スマート・サブスクリプション・マネージャー
          </p>
        </div>
      </div>
      
      <!-- Backup Actions -->
      <div class="header-actions">
        <div class="exchange-rate-badge" id="exchange-rate-display" style="display: none;">
          <i data-lucide="globe"></i>
          <span>USD/JPY: --.-</span>
        </div>
        <button class="btn btn-secondary btn-sm" id="btn-export">
          <i data-lucide="download"></i>バックアップ保存
        </button>
        <label class="btn btn-secondary btn-sm" style="cursor: pointer;">
          <i data-lucide="upload"></i>データ読込
          <input type="file" id="import-file" accept=".json" style="display: none;">
        </label>
      </div>
    </header>

    <!-- Main Dashboard Grid -->
    <main class="dashboard-grid">
      
      <!-- Left Column: KPI Stats, Chart, & Forms -->
      <section class="sidebar-panel">
        
        <!-- KPI Cards -->
        <div class="kpi-container">
          <div class="glass-panel kpi-card">
            <div class="kpi-label">
              <span>今月の支払合計</span>
              <i data-lucide="calendar" style="color: var(--color-other); width: 18px; height: 18px;"></i>
            </div>
            <div class="kpi-value" id="total-monthly">¥0<span>/ 月</span></div>
            <div id="total-monthly-count" style="margin-top: 0.35rem; font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">
              0件登録
            </div>
          </div>
          
          <div class="glass-panel kpi-card annual">
            <div class="kpi-label">
              <span>年間の支払合計</span>
              <i data-lucide="trending-up" style="color: var(--color-ai); width: 18px; height: 18px;"></i>
            </div>
            <div class="kpi-value" id="total-annual">¥0<span>/ 年</span></div>
          </div>
        </div>

        <!-- SVG Donut Chart Breakdown -->
        <div class="glass-panel chart-panel">
          <div class="chart-header">
            <i data-lucide="pie-chart" style="color: var(--color-ai); width: 18px; height: 18px;"></i>
            <span>カテゴリー別支出割合</span>
          </div>
          
          <div class="chart-container">
            <svg class="donut-svg" viewBox="0 0 100 100">
              <circle class="donut-hole" cx="50" cy="50" r="40"></circle>
              <circle class="donut-ring" cx="50" cy="50" r="40"></circle>
            </svg>
            <div class="chart-center-text">
              <div class="chart-center-value" id="chart-center-value">¥0</div>
              <div class="chart-center-label">月額換算</div>
            </div>
          </div>
          
          <div id="chart-no-data" style="display: none; font-size: 0.85rem; color: var(--text-muted); margin: 2rem 0; text-align: center;">
            有効なサブスクリプションを登録すると比率が表示されます。
          </div>
          
          <div class="chart-legend">
            <!-- Dynamically populated legends -->
          </div>
        </div>

        <!-- Subscription Insertion Form -->
        <div class="glass-panel form-panel">
          <div class="form-title">
            <i data-lucide="plus-circle" style="color: var(--color-active); width: 20px; height: 20px;"></i>
            <span>サブスクの新規登録</span>
          </div>
          
          <!-- Add mode switch (Preset catalog vs Custom handwritten) -->
          <div class="mode-toggle">
            <button type="button" class="mode-btn active" id="mode-preset">
              <i data-lucide="grid" style="width: 14px; height: 14px;"></i>プリセット選択
            </button>
            <button type="button" class="mode-btn" id="mode-custom">
              <i data-lucide="pen-tool" style="width: 14px; height: 14px;"></i>手書き・自由入力
            </button>
          </div>

          <form id="add-subscription-form">
            
            <!-- Preset Catalog selection wrapper -->
            <div id="add-preset-area">
              <div class="form-group" style="margin-bottom: 0.75rem;">
                <label style="display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 500;">
                  人気のサブスクカタログ（料金調査済み）
                </label>
                <input type="text" id="preset-search-input" placeholder="カタログ内を検索 (例: Netflix, Prime)..." style="padding: 0.5rem 0.75rem; font-size: 0.85rem; margin-bottom: 0.5rem; background: rgba(0,0,0,0.3);">
              </div>
              <div class="presets-grid" id="presets-grid">
                <!-- Dynamically populated presets -->
              </div>
            </div>

            <!-- Custom Form (Handwritten/自由入力) -->
            <div id="add-custom-area" style="display: none;">
              <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                  <label for="custom-name" style="margin-bottom: 0;">サービス名 <span style="color: var(--color-danger)">*</span></label>
                  <button type="button" class="btn btn-secondary btn-sm" id="btn-web-search-price" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; border-radius: 4px; display: inline-flex; align-items: center; gap: 2px;">
                    <i data-lucide="search" style="width: 12px; height: 12px;"></i>ネットで料金を検索
                  </button>
                </div>
                <input type="text" id="custom-name" placeholder="例: ひかり回線, Adobe CC">
              </div>

              <div class="form-group">
                <label for="custom-category">カテゴリー</label>
                <select id="custom-category">
                  <option value="ai">AI関係</option>
                  <option value="music">音楽</option>
                  <option value="video">画像</option>
                  <option value="amazon">アマゾン</option>
                  <option value="other" selected>その他</option>
                </select>
              </div>

              <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                  <label for="custom-price" style="margin-bottom: 0;">料金（税込） <span style="color: var(--color-danger)">*</span></label>
                  <button type="button" class="btn btn-secondary btn-sm" id="btn-custom-calc" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; border-radius: 4px; display: inline-flex; align-items: center; gap: 2px;">
                    <i data-lucide="calculator" style="width: 12px; height: 12px;"></i>簡易電卓を開く
                  </button>
                </div>
                <div class="input-row" style="grid-template-columns: 80px 1fr 100px; gap: 0.5rem;">
                  <select id="custom-currency" style="padding: 0.75rem 0.5rem;">
                    <option value="jpy" selected>円 (¥)</option>
                    <option value="usd">ドル ($)</option>
                  </select>
                  <input type="number" id="custom-price" placeholder="料金" min="0">
                  <select id="custom-cycle">
                    <option value="monthly" selected>月会費</option>
                    <option value="annual">年会費</option>
                  </select>
                </div>
                <div id="custom-usd-note" style="display: none; font-size: 0.75rem; color: var(--color-ai); margin-top: 0.35rem; margin-bottom: 0.25rem;">
                  ※ 1ドル ＝ 150円（目安レート）で円換算します。
                </div>
                
                <!-- Inline Custom Calculator -->
                <div class="glass-panel calc-popover" id="custom-calc-popover" style="display: none; margin-top: 0.5rem; padding: 0.75rem; border-radius: 8px;">
                  <div class="calc-display" style="background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 4px; text-align: right; font-family: monospace; font-size: 1.1rem; margin-bottom: 0.5rem; height: 32px; overflow: hidden; line-height: 24px; color: white;">0</div>
                  <div class="calc-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.25rem;">
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="C">C</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="back">⌫</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="/">/</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="*">*</button>
                    
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="7">7</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="8">8</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="9">9</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="-">-</button>
                    
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="4">4</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="5">5</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="6">6</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="+">+</button>
                    
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="1">1</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="2">2</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val="3">3</button>
                    <button type="button" class="calc-btn btn btn-primary btn-sm" style="grid-row: span 2; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; padding: 0.25rem;" data-val="=">=</button>
                    
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="grid-column: span 2; padding: 0.25rem; font-size: 0.8rem;" data-val="0">0</button>
                    <button type="button" class="calc-btn btn btn-secondary btn-sm" style="padding: 0.25rem; font-size: 0.8rem;" data-val=".">.</button>
                  </div>
                  <button type="button" class="btn btn-primary btn-sm btn-full" id="btn-custom-calc-apply" style="margin-top: 0.5rem; font-size: 0.8rem; padding: 0.35rem;">計算結果を入力する</button>
                </div>
              </div>

              <div class="form-group">
                <label for="custom-note">メモ（任意）</label>
                <input type="text" id="custom-note" placeholder="例: 毎月25日引落し">
              </div>

              <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                <input type="checkbox" id="custom-pinned" style="width: auto; cursor: pointer; margin-right: 0.25rem;">
                <label for="custom-pinned" style="margin-bottom: 0; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary);">
                  このサブスクリプションをピン留め（最上部に固定）
                </label>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 1rem;">
              <i data-lucide="plus"></i>サブスクを追加する
            </button>
          </form>
        </div>
      </section>
      
      <!-- Right Column: Filters and Cards List -->
      <section class="main-panel">
        
        <div class="list-header">
          <div class="list-title">
            <i data-lucide="layers" style="color: var(--color-other); width: 20px; height: 20px;"></i>
            <span>登録済みのサブスク一覧</span>
          </div>
        </div>

        <!-- Search Bar -->
        <div class="search-bar-container">
          <div class="search-input-wrapper">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="search-input" placeholder="サービス名、料金（金額）、またはメモで検索...">
          </div>
        </div>

        <!-- Filter bar -->
        <div class="filter-bar" id="filter-bar">
          <!-- Dynamically populated filter tabs -->
        </div>

        <!-- Subscriptions Cards grid -->
        <div class="subsc-cards-grid" id="subsc-cards">
          <!-- Dynamically populated cards -->
        </div>
      </section>

    </main>
  </div>

  <!-- Edit/Modify Subscription Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="glass-panel modal-content">
      <div class="modal-header">
        <h2 class="modal-title">
          <i data-lucide="edit-3" style="color: var(--color-edit); width: 22px; height: 22px;"></i>
          <span>サブスクの修正</span>
        </h2>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      
      <form id="edit-subscription-form">
        <input type="hidden" id="edit-id">
        
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <label for="edit-name" style="margin-bottom: 0;">サービス名 <span style="color: var(--color-danger)">*</span></label>
            <button type="button" class="btn btn-secondary btn-sm" id="btn-edit-web-search-price" style="padding: 0.2rem 0.5rem; font-size: 0.75rem; border-radius: 4px; display: inline-flex; align-items: center; gap: 2px;">
              <i data-lucide="search" style="width: 12px; height: 12px;"></i>ネットで料金を検索
            </button>
          </div>
          <input type="text" id="edit-name" required>
        </div>

        <div class="form-group">

  <!-- Monthly registered subscription count patch: original app.js is untouched -->
  <script>
    (function () {
      'use strict';

      const countDisplay = document.getElementById('total-monthly-count');
      const cardsContainer = document.getElementById('subsc-cards');

      if (!countDisplay) return;

      function isVisible(element) {
        if (!element) return false;
        const style = window.getComputedStyle(element);
        return style.display !== 'none' && style.visibility !== 'hidden';
      }

      function isRealSubscriptionCard(card) {
        if (!card || card.nodeType !== 1 || !isVisible(card)) return false;

        const text = (card.textContent || '').trim();
        if (!text) return false;

        // 空データや検索結果なしの案内カードは件数に含めない
        if (
          text.includes('登録すると') ||
          text.includes('見つかりません') ||
          text.includes('該当') ||
          text.includes('データがありません')
        ) {
          return false;
        }

        // 登録済み一覧のカードだけを数える
        if (card.classList.contains('subsc-card')) return true;
        if (card.querySelector('[data-id], .card-actions, .subsc-card-title, .subscription-name')) return true;

        // 料金表示を持つ一覧カードを拾う保険
        if (/¥|円|\$/.test(text) && card.querySelector('button')) return true;

        return false;
      }

      function countFromCards() {
        if (!cardsContainer) return 0;

        const directCards = Array.from(cardsContainer.children).filter(isRealSubscriptionCard);
        if (directCards.length > 0) return directCards.length;

        // app.js側でカードを内側に包む構造でも拾えるようにする
        const nestedCards = Array.from(cardsContainer.querySelectorAll('.subsc-card, [data-id]'))
          .filter(isRealSubscriptionCard);

        return nestedCards.length;
      }

      function countFromKnownStorageKeys() {
        // プリセットカタログを数えないため、全localStorage走査はしない
        const keys = [
          'subscriptions',
          'subscSubscriptions',
          'subsc-box-subscriptions',
          'subscBoxSubscriptions',
          'subscriptionData'
        ];

        for (const key of keys) {
          try {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const data = JSON.parse(raw);
            if (Array.isArray(data)) return data.length;
          } catch (error) {
            // 読めないキーは無視
          }
        }

        return null;
      }

      function updateMonthlyCount() {
        const cardCount = countFromCards();
        const storageCount = countFromKnownStorageKeys();
        const count = cardCount || storageCount || 0;
        countDisplay.textContent = count + '件登録';
      }

      document.addEventListener('DOMContentLoaded', updateMonthlyCount);
      window.addEventListener('load', updateMonthlyCount);
      window.addEventListener('storage', updateMonthlyCount);

      if (cardsContainer) {
        const observer = new MutationObserver(updateMonthlyCount);
        observer.observe(cardsContainer, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['style', 'class', 'data-id']
        });
      }

      document.addEventListener('click', function () {
        setTimeout(updateMonthlyCount, 50);
      });

      document.addEventListener('input', function () {
        setTimeout(updateMonthlyCount, 50);
      });

      setTimeout(updateMonthlyCount, 100);
      setTimeout(updateMonthlyCount, 500);
      setTimeout(updateMonthlyCount, 1000);
    })();
  </script>
